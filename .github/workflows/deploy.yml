name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

      - name: cPanel-Diagnose (UAPI via 443-Proxy)
        run: |
          PROXY="https://cpanel.lastminute-direct.de"

          echo "--- Versuch 1: FTP_USER/FTP_PASS ---"
          curl -sS -k --connect-timeout 15 --max-time 60 \
            -u "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "$PROXY/execute/VersionControl/retrieve" 2>&1 | head -c 2000; echo

          echo "--- Versuch 2: FTP_USERNAME/FTP_PASSWORD ---"
          curl -sS -k --connect-timeout 15 --max-time 60 \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "$PROXY/execute/VersionControl/retrieve" 2>&1 | head -c 2000; echo

      - name: Deploy note
        run: |
          echo "✅ dist/ committed to main — cPanel cron will pull within 5 minutes"
          echo "Commit: $(git rev-parse --short HEAD)"
