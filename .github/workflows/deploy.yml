name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      # Push dist/ + .cpanel.yml to the `deploy` branch.
      # cPanel Git Version Control watches this branch and runs .cpanel.yml on pull.
      - name: Push dist/ to deploy branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan deploy-tmp
          git rm -rf . --quiet

          git show main:.cpanel.yml > .cpanel.yml
          git add dist/ .cpanel.yml
          git commit -m "deploy: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          git push origin deploy-tmp:deploy --force
