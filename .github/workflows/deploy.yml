name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

      # HINWEIS (2026-07-07): Server-Cron-Pull hängt seit 23.06. — dist/.htaccess ist
      # server-seitig lokal modifiziert, der Canonical-Build vom 01.07. änderte die Datei
      # → git pull bricht ab ("Your local changes"). Die FTP_*-Secrets hier sind KEINE
      # cPanel-Logins. Fix wie bei about-berlin-hotels (gleicher cPanel-Account scdunumd):
      # CPANEL_USER/CPANEL_PASS als Secrets setzen, dann UAPI über 443-Proxy
      # (https://cpanel.lastminute-direct.de/execute/...): Fileman save_file_content
      # (dist/.htaccess auf Git-Stand des Server-HEAD 5e72d75), VersionControl/update,
      # VersionControlDeployment/create. Vorlage: about-berlin-hotels deploy.yml.
      - name: Deploy note
        run: |
          echo "✅ dist/ committed to main — cPanel cron will pull within 5 minutes"
          echo "Commit: $(git rev-parse --short HEAD)"
