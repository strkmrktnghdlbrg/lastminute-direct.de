name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # manueller Trigger via GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"
          ls -la dist/ | head -15

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            --exclude='.well-known' \
            --exclude='*.zip' \
            --exclude='wp-*' \
            --exclude='xmlrpc.php' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" \
            ./dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}

      - name: Smoke-test live site
        run: |
          sleep 5
          echo "--- HTTP-Status ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} | %{url}\n" https://lastminute-direct.de/
          echo "--- Sitemap ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} | %{url}\n" https://lastminute-direct.de/sitemap-index.xml
          echo "--- 301 (alter WP-Artikel -> /magazin/) ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" https://lastminute-direct.de/reiseziele/besten-inseln/
          echo "--- 301 (altes Archiv -> Cluster-Hub) ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" https://lastminute-direct.de/stadtreisen/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
