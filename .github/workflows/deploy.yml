name: Deploy to MyTrueHost (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: # manueller Trigger via GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"
          ls -la dist/ | head -15

      # Deployment via FTP/FTPS zu MyTrueHost.
      # Benötigte GitHub-Secrets:
      #   FTP_SERVER     -> z. B. ftp.lastminute-direct.de oder der MyTrueHost-FTP-Host
      #   FTP_USERNAME   -> FTP-Benutzername
      #   FTP_PASSWORD   -> FTP-Passwort
      #   FTP_SERVER_DIR -> Zielverzeichnis auf dem Server, z. B. "/public_html/" (mit Slash am Ende)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Bestehende Server-Dateien, die nicht aus dem Build stammen, nicht löschen
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.well-known/**
            **/wp-*
            **/xmlrpc.php

      - name: Smoke-test live site
        run: |
          sleep 5
          echo "--- HTTP-Status ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} | %{url}\n" https://lastminute-direct.de/
          echo "--- Sitemap ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} | %{url}\n" https://lastminute-direct.de/sitemap-index.xml
          echo "--- 301 (alter WP-Artikel -> /magazin/) ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" https://lastminute-direct.de/reiseziele/besten-inseln/
          echo "--- 301 (altes Archiv -> Cluster-Hub) ---"
          curl -sI -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" https://lastminute-direct.de/stadtreisen/
