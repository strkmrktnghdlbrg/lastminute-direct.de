name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

      - name: Trigger cPanel pull & deploy
        run: |
          BASE="https://king.truehostdns.com:2083"
          AUTH="${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}"
          REPO="/home/scdunumd/public_html/lastminute-direct.de"

          echo "--- Pulling from GitHub ---"
          curl -sk -u "$AUTH" \
            -H "Content-Type: application/json" \
            -X POST "$BASE/execute/VersionControl/update" \
            -d "{\"repository_root\": \"/home/scdunumd/public_html/lastminute-direct.de\"}" 2>&1 || true

          echo "--- Deploying HEAD commit ---"
          curl -sk -u "$AUTH" \
            -H "Content-Type: application/json" \
            -X POST "$BASE/execute/VersionControlDeployment/create" \
            -d "{\"repository_root\": \"/home/scdunumd/public_html/lastminute-direct.de\"}" 2>&1 || true
